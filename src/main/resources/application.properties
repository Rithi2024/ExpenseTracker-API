# Server
server.port=${PORT:8080}
spring.application.name=expense-tracker-api

# Database - SQL Server
spring.datasource.url=${EXPENSE_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ExpenseDB}
spring.datasource.username=${EXPENSE_DB_USERNAME:sa}
spring.datasource.password=${EXPENSE_DB_PASSWORD:YourPassword123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
